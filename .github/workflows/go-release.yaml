name: Go Release

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use"
        required: false
        type: string
        default: ">=1.24"
      semver-config:
        description: "Path to semver config file"
        required: false
        type: string
        default: "semver.yaml"
      docker-enabled:
        description: "Enable Docker builds"
        required: false
        type: boolean
        default: false
      docker-registry:
        description: "Docker registry to push to"
        required: false
        type: string
        default: "ghcr.io"
      rolling-release-tag:
        description: "Create a rolling release tag (e.g., 'v1')"
        required: false
        type: string
        default: ""
      lfs:
        description: "Enable Git LFS checkout (for repos with large files)"
        required: false
        type: boolean
        default: false
    outputs:
      version:
        description: "The calculated version (without v prefix)"
        value: ${{ jobs.version.outputs.version }}
      version_tag:
        description: "The version tag (with v prefix)"
        value: ${{ jobs.version.outputs.version_tag }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: ${{ inputs.lfs }}

      - name: Run workflow prepare script
        shell: bash
        run: |
          if [ -f "./workflow-prepare.sh" ]; then
            chmod +x ./workflow-prepare.sh
            ./workflow-prepare.sh
          fi

      - name: Run tests
        uses: lukaszraczylo/shared-actions/.github/actions/go-test@main
        with:
          go-version: ${{ inputs.go-version }}

  version:
    name: Calculate Version
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      version_tag: ${{ steps.semver.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: ${{ inputs.lfs }}

      - name: Run workflow prepare script
        shell: bash
        run: |
          if [ -f "./workflow-prepare.sh" ]; then
            chmod +x ./workflow-prepare.sh
            ./workflow-prepare.sh
          fi

      - name: Calculate version
        id: semver
        uses: lukaszraczylo/shared-actions/.github/actions/semver@main
        with:
          config-file: ${{ inputs.semver-config }}

  release:
    name: Release
    needs: version
    if: needs.version.outputs.version_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: ${{ inputs.lfs }}

      - name: Run workflow prepare script
        # Expose the computed release version to a repo-local workflow-prepare.sh
        # (e.g. to stamp the version into source for runtimes that cannot resolve
        # it at build time, such as Yaegi-interpreted Traefik plugins). Only the
        # release job has a version; the test/version jobs run the hook without
        # it. VERSION is the bare semver (1.2.3); VERSION_TAG keeps the v prefix.
        env:
          VERSION: ${{ needs.version.outputs.version }}
          VERSION_TAG: ${{ needs.version.outputs.version_tag }}
        shell: bash
        run: |
          if [ -f "./workflow-prepare.sh" ]; then
            chmod +x ./workflow-prepare.sh
            ./workflow-prepare.sh
          fi

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}

      # Docker setup (optional)
      - name: Set up QEMU
        if: inputs.docker-enabled
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: inputs.docker-enabled
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: inputs.docker-enabled
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: lukaszraczylo/shared-actions/.github/actions/goreleaser@main
        with:
          version-tag: ${{ needs.version.outputs.version_tag }}
          mode: full
          github-token: ${{ secrets.GITHUB_TOKEN }}
          homebrew-tap-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Rolling release
        if: inputs.rolling-release-tag != ''
        uses: lukaszraczylo/shared-actions/.github/actions/rolling-release@main
        with:
          tag: ${{ inputs.rolling-release-tag }}
          version-tag: ${{ needs.version.outputs.version_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
